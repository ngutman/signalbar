name: CI

on:
  push:
  pull_request:

jobs:
  lint-build-test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Install lint tools
        run: |
          set -euo pipefail
          brew install swiftlint
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o /tmp/swiftformat.zip https://github.com/nicklockwood/SwiftFormat/releases/download/0.58.7/swiftformat.zip
          unzip -q /tmp/swiftformat.zip -d /tmp/swiftformat-bin
          install /tmp/swiftformat-bin/swiftformat "$HOME/.local/bin/swiftformat"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          swiftformat --version
          swiftlint version

      - name: Lint
        run: ./scripts/lint.sh

      - name: Shell syntax checks
        run: |
          bash -n run-menubar.sh
          bash -n stop-menubar.sh
          bash -n scripts/release_common.sh
          bash -n scripts/check_release_prereqs.sh
          bash -n scripts/setup_notarytool_profile.sh
          bash -n scripts/package_app.sh
          bash -n scripts/sign_release.sh
          bash -n scripts/verify_release.sh
          bash -n scripts/release_local.sh
          bash -n scripts/release_public.sh
          bash -n scripts/publish_github_release.sh
          bash -n scripts/release_github_local.sh
          bash -n scripts/render_screenshots.sh

      - name: Build
        run: swift build

      - name: Test
        run: swift test
